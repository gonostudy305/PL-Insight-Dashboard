# PL-Insight NGINX — Load Balancer Configuration
# Cân bằng tải cho FastAPI/PhoBERT workers
#
# Architecture:
#   Client → NGINX (:80)
#     ├── /api/*     → Node.js backend (:3000)
#     └── /ai/*      → FastAPI workers (round-robin)
#                       ├── worker 1 (:8000)
#                       └── worker 2 (:8001)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ── Logging ──
    log_format main '$remote_addr - [$time_local] "$request" $status '
                    '$body_bytes_sent "$upstream_addr" $upstream_response_time';

    access_log logs/access.log main;
    error_log  logs/error.log warn;

    # ── Load Balancer: FastAPI PhoBERT Workers ──
    upstream phobert_workers {
        # Round-robin (default) — phân phối đều request
        # Có thể đổi sang least_conn hoặc ip_hash nếu cần
        server 127.0.0.1:8000;
        server 127.0.0.1:8001;

        # Health check: nếu worker fail 3 lần trong 30s → tạm bỏ 30s
        # (NGINX Plus feature, nhưng passive check vẫn hoạt động)
    }

    # ── Node.js Backend ──
    upstream nodejs_backend {
        server 127.0.0.1:3000;
    }

    # ── Main Server ──
    server {
        listen 80;
        server_name localhost;

        # Proxy timeout cho PhoBERT inference (có thể mất 5-10s)
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # ── PhoBERT AI endpoints → Load Balanced ──
        location /ai/ {
            proxy_pass http://phobert_workers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Retry next worker nếu worker hiện tại bị lỗi
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;

            # CORS headers
            add_header X-Upstream $upstream_addr always;
        }

        # ── Node.js API endpoints ──
        location /api/ {
            proxy_pass http://nodejs_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── NGINX Status (để demo monitoring) ──
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }

        # ── Default ──
        location / {
            return 200 '{"service":"PL-Insight Load Balancer","status":"running"}';
            add_header Content-Type application/json;
        }
    }
}
